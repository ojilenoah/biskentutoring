<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#ffffff"/>
  
  <!-- Purple B shape -->
  <path d="M 300 200 L 600 200 Q 750 200 750 350 Q 750 450 650 480 Q 750 510 750 650 Q 750 800 600 800 L 300 800 Z" fill="#5B21B6" stroke="none"/>
  
  <!-- Speech bubble (upper) -->
  <g transform="translate(280, 260)">
    <rect x="0" y="0" width="240" height="120" rx="30" fill="#5B21B6"/>
    <path d="M 60 120 L 30 180 L 120 120" fill="#5B21B6"/>
    <!-- Orange highlight in bubble -->
    <rect x="60" y="30" width="120" height="60" rx="15" fill="#F59E0B"/>
  </g>
  
  <!-- Open book (lower) -->
  <g transform="translate(280, 480)">
    <!-- Book pages -->
    <path d="M 40 40 Q 100 60 160 40 L 160 200 Q 100 220 40 200 Z" fill="#F59E0B" stroke="none"/>
    <path d="M 200 40 Q 260 60 320 40 L 320 200 Q 260 220 200 200 Z" fill="#FBBF24" stroke="none"/>
    <!-- Orange accent lines -->
    <line x1="60" y1="100" x2="140" y2="100" stroke="#5B21B6" stroke-width="8" stroke-linecap="round"/>
    <line x1="220" y1="100" x2="300" y2="100" stroke="#5B21B6" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>